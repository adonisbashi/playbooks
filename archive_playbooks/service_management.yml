---
- name: Service Management Playbook
  hosts: macbookair
  become: true

  tasks:

    - name: Install HTTPD
      ansible.builtin.dnf:
        name: httpd
        state: present 
      when: run_httpd | default(false)

    - name: Start and enable HTTPD service if not already started
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: yes
      when: run_httpd | default(false)

    - name: Open firewall for HTTP on machine1
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: true
      when: run_httpd | default(false)

    - name: Install bind
      ansible.builtin.dnf:
        name: bind
        state: present 
      when: run_dns | default(false)

    - name: Start and enable bind service if not already started
      ansible.builtin.service:
        name: named
        state: started
        enabled: yes
      when: run_dns | default(false)

    - name: Add HTML page to machine 1 only
      ansible.builtin.copy:
        src: "{{ html_source }}"
        dest: "{{ html_dest }}"
        owner: root
        group: root
        mode: '0644'
      when: run_httpd | default(false)
      
        