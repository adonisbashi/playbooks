---
- name: Deploy disk check cron job every day at 2AM and log results
  hosts: pizzeria
  become: true

  tasks:
  
    - name: Ensure logging file exists with correct permissions
      ansible.builtin.file:
        path: "{{ log_path }}"
        owner: root
        group: root
        mode: '0644'
        state: touch

    - name: Deploy cron job to check disk usage daily
      ansible.builtin.cron:
        name: "check disk usage"
        minute: "0"
        hour: "2"
        job: 'df -h >> "{{ log_path }}"'