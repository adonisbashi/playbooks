# Conditional: when: run_httpd | default(false) — controlled in site.yml

- name: Install HTTPD
  ansible.builtin.dnf:
    name: httpd
    state: present 

- name: Start and enable HTTPD service if not already started
  ansible.builtin.service:
    name: httpd
    state: started
    enabled: yes

- name: Open firewall for HTTP on machine1
  ansible.posix.firewalld:
    service: http
    permanent: true
    state: enabled
    immediate: true
