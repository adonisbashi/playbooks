- name: Set vm.swappiness to 10
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ swappiness_value }}"
    sysctl_set: true
    state: present
    reload: true

- name: Increase max file size open
  ansible.posix.sysctl:
    name: fs.file-max
    value: "{{ max_file_value }}"
    sysctl_set: true
    state: present
    reload: true