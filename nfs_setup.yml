---
- name: Install NFS packages and mount directories across servers
  hosts: pizzeria
  become: true

  tasks:
    - name: Full NFS setup and configuration across servers
      block:
        
        - name: Install and configure NFS on machine1 (host-server)
          ansible.builtin.dnf:
            name: nfs-utils
            state: present

        - name: Create shared data directory
          ansible.builtin.file:
            path: "{{ nfs_export_path }}"
            state: directory

        - name: Add entry to /etc/exports for nfs server
          ansible.builtin.lineinfile:
            path: /etc/exports
            line: "{{ nfs_export_path }} {{ nfs_export_options }}"
            insertafter: EOF

        - name: Start and enable NFS server
          ansible.builtin.service:
            name: nfs-server
            state: started
            enabled: yes

      when: inventory_hostname == 'machine1'

      block:

        - name: Install and configure NFS on machine2 (client-server)
          ansible.builtin.dnf:
            name: nfs-utils
            state: present

        - name: Create mount point for NFS
          ansible.builtin.file:
            path: "{{ nfs_mount_point }}"
            state: directory

        - name: Mount NFS share onto mount point
          ansible.posix.mount:
            src: "{{ nfs_ip }}:{{ nfs_export_path }}"
            path: "{{ nfs_mount_point }}"
            opts: rw,sync,no_root_squash
            state: mounted
            fstype: nfs

      when: inventory_hostname == 'machine2'