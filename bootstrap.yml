---
- name: Configure new server
  hosts: pizzeria
  become: true

  tasks:

    - name: Set hostname for new server
      ansible.builtin.hostname:
        name: "{{ new_server_hostname }}"
        use: systemd

    - name: Configure passwordless sudo for new server
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        line: "ado ALL=(ALL) NOPASSWD: ALL"
        validate: 'visudo -cf %s'

    - name: Deploy SSH public key for keyless entry
      ansible.posix.authorized_key:
        user: ado
        state: present
        key: "{{ lookup('file', pub_key) }}"

    - name: Configure static IP address
      community.general.nmcli:
        conn_name: "{{ network_interface }}"
        ifname: "{{ network_interface }}"
        type: ethernet
        ip4: "{{ new_static_ip }}/24"
        gw4: "{{ gateway }}"
        dns4:
          - "{{ gateway }}"
          - 8.8.8.8
        state: present
        autoconnect: true

    - name: Bring connection up
      ansible.builtin.command:
        cmd: nmcli connection up "{{ network_interface }}"
      changed_when: false
