---
- name: Run all playbooks
  hosts: pizzeria
  become: true

  roles:
    - role: pizzeria_setup
    - role: users
    - role: hardening
    - role: ulimits
    - role: cron
    - role: file_permissions
    - role: lvm
    - role: httpd
      when: run_httpd
    - role: dns
      when: run_dns
    - role: nfs